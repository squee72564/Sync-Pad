services:
  postgres:
    image: postgres:17-alpine
    container_name: syncpad-postgres
    restart: unless-stopped
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-syncpad}
      POSTGRES_USER: ${POSTGRES_USER:-syncpad}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-syncpad}
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-syncpad} -d ${POSTGRES_DB:-syncpad}
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  permify:
    image: ghcr.io/permify/permify:v1.6.9
    container_name: syncpad-permify
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '3476:3476'
      - '3478:3478'
    environment:
      PERMIFY_LOG_LEVEL: info
      PERMIFY_LOG_OUTPUT: text
      PERMIFY_HTTP_ENABLED: 'true'
      PERMIFY_HTTP_PORT: '3476'
      PERMIFY_GRPC_PORT: '3478'
      PERMIFY_DATABASE_ENGINE: postgres
      PERMIFY_DATABASE_URI: postgres://${POSTGRES_USER:-syncpad}:${POSTGRES_PASSWORD:-syncpad}@postgres:5432/${POSTGRES_DB:-syncpad}?sslmode=disable
      PERMIFY_DATABASE_AUTO_MIGRATE: 'true'

volumes:
  postgres-data:
