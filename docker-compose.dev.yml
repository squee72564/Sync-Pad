services:
  postgres:
    image: postgres:17-alpine
    container_name: syncpad-postgres
    restart: unless-stopped
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-syncpad}
      POSTGRES_USER: ${POSTGRES_USER:-syncpad}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-syncpad}
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-syncpad} -d ${POSTGRES_DB:-syncpad}
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
